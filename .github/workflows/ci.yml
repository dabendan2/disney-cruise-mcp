name: Disney Cruise MCP CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test-unit:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Create dummy .env for unit tests
        run: |
          echo "DISNEY_EMAIL=test@example.com" > .env
          echo "DISNEY_PASSWORD=password123" >> .env
      - name: Run Unit Tests
        run: npm run test:unit

  test-e2e:
    name: Run E2E Tests (Manual/Live)
    needs: test-unit
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Install Playwright Browsers
        run: npx playwright install chromium
      - name: Setup Environment
        run: |
          echo "DISNEY_EMAIL=${{ secrets.DISNEY_EMAIL }}" >> .env
          echo "DISNEY_PASSWORD=${{ secrets.DISNEY_PASSWORD }}" >> .env
      - name: Start Background Chrome with CDP
        run: |
          nohup npx playwright launch-server --browser chromium --port 9222 &
          sleep 5
      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          CDP_URL: "http://localhost:9222"
